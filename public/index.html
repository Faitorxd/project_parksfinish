<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#0284C7"/>
  <meta name="description" content="Descubre los mejores parques infantiles de Yaiza. Espacios inclusivos, divertidos y 100% accesibles para jugar sin límites."/>
  <meta name="keywords" content="parques, infantiles, yaiza, inclusivos, accesibles, juegos, lanzarote, ayuntamiento"/>
  <meta name="author" content="Ayuntamiento de Yaiza" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://playyaiza.com/" />
  <meta property="og:title" content="PLayYaiza | Parques Infantiles de Yaiza" />
  <meta property="og:description" content="Descubre todos los parques infantiles del municipio de Yaiza. Espacios de juego seguros, inclusivos y divertidos." />
  <meta property="og:image" content="/image(1).png" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="PLayYaiza | Parques Infantiles" />
  <meta property="twitter:description" content="Descubre todos los parques infantiles inclusivos del municipio de Yaiza." />
  <meta property="twitter:image" content="/image(1).png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/image(1).png" />
  <link rel="apple-touch-icon" href="/image(1).png" />

  <title>PLayYaiza | Parques Infantiles Inclusivos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFCFF; color: #0F172A; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }
    @keyframes popUp   { from { opacity:0; transform:scale(.88) translateY(18px) } to { opacity:1; transform:none } }
    @keyframes spin    { to   { transform:rotate(360deg) } }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes float   { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-12px) rotate(-3deg)} }
    @keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#F1F5F9}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
